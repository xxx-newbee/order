name: Build Docker and Deploy

on:
  push:
    branches:
      - "main"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 构建并推送 Docker 镜像
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: newlybee/order-srv:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # 2. SSH 连接服务器拉取镜像并重启
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 停止旧容器
            docker stop order-srv || true
            docker rm order-srv || true
            
            docker rmi newlybee/order-srv:latest
            
            # 拉取最新镜像
            docker pull newlybee/order-srv:latest
            
            # 启动新容器
            docker run -d --name order-srv --network host --restart always -v ~/go-micro/order.yaml:/app/order.yaml newlybee/order-srv:latest service -c /app/order.yaml
